name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with csc (.NET Framework)
        shell: cmd
        run: build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pasha
          path: |
            Pasha.exe
            Pasha.exe.config
